<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JLPT N5 Online Test - 200 Questions</title>
    <style>
        :root {
            --primary: #d63031;
            --secondary: #2d3436;
            --success: #27ae60;
            --error: #e74c3c;
            --bg: #f5f6fa;
            --white: #ffffff;
        }

        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            background: var(--bg); 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            padding: 10px;
        }

        .container { 
            width: 100%; 
            max-width: 600px; 
            background: var(--white); 
            padding: 20px; 
            border-radius: 15px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            margin-top: 20px;
        }

        header { text-align: center; border-bottom: 2px solid #eee; margin-bottom: 20px; padding-bottom: 10px; }
        h1 { color: var(--primary); font-size: 1.5rem; margin: 0; }

        /* Menu chính */
        .menu-grid { display: grid; grid-template-columns: 1fr; gap: 12px; }
        .btn-menu { 
            padding: 15px; border: none; border-radius: 10px; 
            background: var(--secondary); color: white; 
            font-size: 1rem; font-weight: bold; cursor: pointer; 
            transition: 0.3s;
        }
        .btn-menu:hover { background: var(--primary); }

        /* Vùng câu hỏi */
        #quiz-box { display: none; }
        .progress-bar { font-size: 0.9rem; color: #666; margin-bottom: 15px; display: flex; justify-content: space-between; }
        .q-text { font-size: 1.15rem; font-weight: bold; line-height: 1.5; margin-bottom: 20px; display: block; color: #2d3436; }
        
        .option-item { 
            background: #f8f9fa; border: 2px solid #e9ecef; padding: 14px; 
            margin-bottom: 10px; border-radius: 10px; cursor: pointer; 
            transition: 0.2s; font-size: 1rem;
        }
        .option-item:active { transform: scale(0.98); }
        .correct { background: #d4edda !important; border-color: var(--success) !important; color: #155724; }
        .wrong { background: #f8d7da !important; border-color: var(--error) !important; color: #721c24; }

        .explanation { 
            display: none; margin-top: 15px; padding: 15px; 
            background: #e1f5fe; border-left: 5px solid #03a9f4; 
            border-radius: 5px; font-size: 0.95rem; line-height: 1.4;
        }

        /* Màn hình kết quả */
        #result-screen { display: none; text-align: center; }
        .score-circle { 
            width: 120px; height: 120px; line-height: 120px; 
            border-radius: 50%; background: var(--primary); 
            color: white; font-size: 2rem; margin: 20px auto; font-weight: bold; 
        }

        .nav-btns { display: flex; justify-content: space-between; margin-top: 25px; }
        .btn-nav { padding: 12px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        #next-btn { background: var(--success); color: white; display: none; width: 100%; }
        #exit-btn { background: #b2bec3; color: white; margin-right: 10px; }

        @media (min-width: 768px) {
            .menu-grid { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>

<div class="container">
    <header id="header-ui">
        <h1>N5 MASTER TEST</h1>
        <p style="font-size: 0.8rem; color: #7f8c8d;">Luyện thi 200 câu hỏi cấu trúc JLPT</p>
    </header>

    <!-- MÀN HÌNH CHỌN PHẦN THI -->
    <div class="menu-grid" id="main-menu">
        <button class="btn-menu" onclick="startQuiz('kanji')">KANJI (50 Câu)</button>
        <button class="btn-menu" onclick="startQuiz('vocab')">TỪ VỰNG (50 Câu)</button>
        <button class="btn-menu" onclick="startQuiz('grammar')">NGỮ PHÁP (50 Câu)</button>
        <button class="btn-menu" onclick="startQuiz('particle')">TRỢ TỪ (50 Câu)</button>
    </div>

    <!-- MÀN HÌNH LÀM BÀI -->
    <div id="quiz-box">
        <div id="question-container">
            <div class="progress-bar">
                <span id="progress-text">Câu 1/50</span>
                <span id="score-text">Đúng: 0</span>
            </div>
            <span class="q-text" id="q-text">Đang tải câu hỏi...</span>
            <div id="options"></div>
            <div class="explanation" id="explanation"></div>
        </div>

        <!-- MÀN HÌNH KẾT QUẢ -->
        <div id="result-screen">
            <h2>HOÀN THÀNH!</h2>
            <div class="score-circle" id="final-score">0/50</div>
            <p id="rank-comment" style="font-weight: bold; color: var(--secondary);"></p>
            <button class="btn-menu" style="width: 100%" onclick="location.reload()">Làm lại từ đầu</button>
        </div>

        <div class="nav-btns">
            <button class="btn-nav" id="exit-btn" onclick="goHome()">Thoát</button>
            <button class="btn-nav" id="next-btn" onclick="nextQuestion()">Tiếp theo ➔</button>
        </div>
    </div>
</div>

let currentCat = '';
let currentIdx = 0;
let score = 0;
let answered = false;

function startQuiz(cat) {
    currentCat = cat;
    currentIdx = 0;
    score = 0;
    document.getElementById('main-menu').style.display = 'none';
    document.getElementById('header-ui').style.display = 'none';
    document.getElementById('quiz-box').style.display = 'block';
    renderQuestion();
}

function renderQuestion() {
    answered = false;
    const currentList = database[currentCat];
    const totalInCat = currentList.length; 
    
    // Nếu làm hết câu hỏi thực tế thì dừng lại và hiện kết quả
    if (currentIdx >= totalInCat) {
        showResult();
        return;
    }

    const data = currentList[currentIdx];
    
    // Tự động cập nhật tiến độ theo số câu thực tế (Ví dụ: 1/24 thay vì 1/50)
    document.getElementById('progress-text').innerText = `Câu ${currentIdx + 1}/${totalInCat}`;
    document.getElementById('score-text').innerText = `Đúng: ${score}`;
    
    document.getElementById('q-text').innerText = data.q;
    document.getElementById('explanation').style.display = 'none';
    document.getElementById('next-btn').style.display = 'none';

    const optionsDiv = document.getElementById('options');
    optionsDiv.innerHTML = '';
    data.a.forEach((text, i) => {
        const btn = document.createElement('div');
        btn.className = 'option-item';
        btn.innerText = text;
        btn.onclick = () => checkAnswer(i);
        optionsDiv.appendChild(btn);
    });
}

function checkAnswer(idx) {
    if(answered) return;
    answered = true;
    const data = database[currentCat][currentIdx];
    const options = document.getElementsByClassName('option-item');
    
    if(idx === data.c) {
        options[idx].classList.add('correct');
        score++;
    } else {
        options[idx].classList.add('wrong');
        options[data.c].classList.add('correct');
    }

    const exp = document.getElementById('explanation');
    exp.innerHTML = `<b>Giải thích:</b> ${data.e}`;
    exp.style.display = 'block';
    document.getElementById('next-btn').style.display = 'block';
    document.getElementById('exit-btn').style.display = 'none';
}

function nextQuestion() {
    currentIdx++;
    if(currentIdx < database[currentCat].length) {
        renderQuestion();
    } else {
        showResult();
    }
}

function showResult() {
    document.getElementById('question-container').style.display = 'none';
    document.getElementById('next-btn').style.display = 'none';
    document.getElementById('result-screen').style.display = 'block';
    
    const total = database[currentCat].length;
    document.getElementById('final-score').innerText = `${score}/${total}`;
    
    let msg = "";
    const percent = (score/total)*100;
    if(percent >= 80) msg = "Tuyệt vời! Bạn đã nắm chắc kiến thức.";
    else if(percent >= 50) msg = "Khá tốt! Hãy cố gắng thêm chút nữa.";
    else msg = "Bạn cần ôn tập kỹ hơn giáo trình Minna nhé.";
    document.getElementById('rank-comment').innerText = msg;
}

function goHome() {
    if(confirm("Bạn muốn thoát và mất hết kết quả hiện tại?")) {
        location.reload();
    }
}
</script>
